# ============================================================================
# block.properties - Block to Material ID mapping
# EnigmaDefault ShaderBundle (Phase 5: Water & Reflection)
#
# Format: block.<materialId>=namespace:registryName [namespace:registryName ...]
# Multiple block names per line are space-separated.
# Material ID 0 is reserved (no special material).
#
# Shader reads material ID from TerrainVertex.m_entityId (TEXCOORD2).
# ============================================================================
# Water blocks
block.32000=simpleminer:water
# Ice blocks (future)
# block.32004=simpleminer:ice simpleminer:packed_ice simpleminer:blue_ice
# Emissive blocks (future)
# block.32100=simpleminer:glowstone
